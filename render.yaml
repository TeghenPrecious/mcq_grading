services:
  - type: web
    name: examflow
    env: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        sync: false
    disk:
      name: examflow-data
      mountPath: /data
      sizeGB: 1
